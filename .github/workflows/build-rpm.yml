---
name: Build RPM
permissions:
  contents: read

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build RPM (AlmaLinux ${{ matrix.almalinux }})
    runs-on: ubuntu-latest
    container: almalinux:${{ matrix.almalinux }}
    strategy:
      fail-fast: false
      matrix:
        almalinux: ["8", "9", "10"]

    steps:
      - name: Install build dependencies
        run: dnf install -y rpm-build rpmdevtools make tar gzip git

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mark repo as safe for git
        run: git config --global --add safe.directory '*'

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Manual dispatch — use most recent tag, strip leading 'v'
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [[ -n "$LATEST" ]]; then
              VERSION="${LATEST#v}"
            else
              # No tags at all — fall back to spec Version: field
              VERSION=$(grep -m1 '^Version:' artwork.spec | awk '{print $2}')
            fi
          fi
          echo "VERSION=${VERSION}" | tee -a "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Create source tarball
        shell: bash
        run: |
          git archive \
            --prefix="artwork-${VERSION}/" \
            --output="${HOME}/rpmbuild/SOURCES/artwork-v${VERSION}.tar.gz" \
            HEAD

      - name: Prepare spec with tag version
        shell: bash
        run: |
          sed "s/^Version:.*/Version:        ${VERSION}/" artwork.spec \
            > "${HOME}/rpmbuild/SPECS/artwork.spec"

      - name: Build RPM
        run: rpmbuild -bb "${HOME}/rpmbuild/SPECS/artwork.spec"

      - name: Collect built RPM
        shell: bash
        run: |
          mkdir -p rpms
          find "${HOME}/rpmbuild/RPMS" -name '*.rpm' -exec cp {} rpms/ \;
          ls -lh rpms/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v5
        with:
          name: rpm-el${{ matrix.almalinux }}
          path: rpms/*.rpm
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all RPM artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: rpm-el*
          merge-multiple: true
          path: rpms/

      - name: List RPMs to be released
        run: ls -lh rpms/

      - name: Create GitHub Release and upload RPMs
        uses: softprops/action-gh-release@v2
        with:
          files: rpms/*.rpm
          generate_release_notes: true
